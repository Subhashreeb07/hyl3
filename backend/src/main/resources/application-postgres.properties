spring.datasource.url=${DB_URL:${APP_DB_URL:jdbc:postgresql://localhost:5433/hyland}}
spring.datasource.username=${DB_USERNAME:${APP_DB_USERNAME:hyhub_app}}
spring.datasource.password=${DB_PASSWORD:${APP_DB_PASSWORD:hyhub_app}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
