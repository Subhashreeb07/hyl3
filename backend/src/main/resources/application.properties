spring.application.name=hy-backend
spring.profiles.active=local

# Default local setup (H2 file-based for data persistence). Override with PostgreSQL settings per environment.
spring.datasource.url=jdbc:h2:./data/hyhubdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.defaultModelsExpandDepth=-1

app.qr.secret=${APP_QR_SECRET:hy-platform-qr-secret}
app.notifications.processor.cron=${APP_NOTIFICATIONS_PROCESSOR_CRON:0 */1 * * * *}
app.notifications.processor.batch-size=${APP_NOTIFICATIONS_PROCESSOR_BATCH_SIZE:100}
