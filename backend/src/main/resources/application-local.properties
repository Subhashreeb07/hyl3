# Local profile using a real PostgreSQL instance so development matches production behavior.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/hyhub}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:hyhub_app}
spring.datasource.password=${DB_PASSWORD:hyhub_app}

spring.datasource.hikari.pool-name=hyhub-local-hikari
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.validation-timeout=${DB_VALIDATION_TIMEOUT_MS:5000}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT_MS:300000}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME_MS:1800000}
spring.datasource.hikari.keepalive-time=${DB_KEEPALIVE_TIME_MS:240000}
spring.datasource.hikari.initialization-fail-timeout=${DB_INITIALIZATION_FAIL_TIMEOUT_MS:1}
spring.datasource.hikari.auto-commit=false
spring.datasource.hikari.data-source-properties.reWriteBatchedInserts=true
spring.datasource.hikari.data-source-properties.prepareThreshold=3
spring.datasource.hikari.data-source-properties.stringtype=unspecified
spring.datasource.hikari.data-source-properties.cachePrepStmts=true
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048

spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.properties.hibernate.jdbc.batch_size=${HIBERNATE_BATCH_SIZE:50}
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

spring.flyway.default-schema=public
spring.flyway.clean-disabled=true
spring.flyway.validate-migration-naming=true
spring.h2.console.enabled=false

